services:
  metube:
    image: alexta69/metube:2026.04.28
    container_name: metube
    restart: unless-stopped
    ports:
      - "8080:8081"
    volumes:
      - /opt/hometools/data/metube:/downloads
    environment:
      DELETE_FILE_ON_TRASHCAN: "true"
      YTP_METADATA: "false"
      YTDL_OPTIONS: '{"writethumbnail": false, "writeinfojson": false, "addmetadata": false}'
      YTP_POSTPROCESSOR_ARGS: "ffmpeg:-map_metadata -1 -fflags +bitexact -flags:v +bitexact -flags:a +bitexact"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  stirling-pdf:
    image: ghcr.io/stirling-tools/stirling-pdf:v2.10.0
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  samba:
    image: crazymax/samba:4.24.1
    container_name: samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
      - "137:137/udp"
      - "138:138/udp"
    environment:
      - "TZ=Europe/Bucharest"
      - "SAMBA_USERS=${SAMBA_USER}:${SAMBA_PASS}"
      - "SAMBA_SHARES=Downloads;/mnt/Media;yes;no;no;${SAMBA_USER}"
    volumes:
      - /opt/hometools/data/metube:/mnt/Media
    healthcheck:
      test: ["CMD", "smbclient", "-L", "localhost", "-U", "${SAMBA_USER}%${SAMBA_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 3
