services:
  metube:
    image: alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "8080:8081"
    volumes:
      - /opt/hometools/data/metube:/downloads
    environment:
      DELETE_FILE_ON_TRASHCAN: "true"
      YTP_METADATA: "false"
      YTDL_OPTIONS: '{"writethumbnail": false, "writeinfojson": false, "addmetadata": false}'
      YTP_POSTPROCESSOR_ARGS: "ffmpeg:-map_metadata -1 -fflags +bitexact -flags:v +bitexact -flags:a +bitexact"
    healthcheck:

      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health | grep -q 'OK' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  stirling-pdf:
    image: ghcr.io/stirling-tools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/info/status | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  samba:
    image: crazymax/samba:latest
    container_name: samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
      - "137:137/udp"
      - "138:138/udp"
    environment:
      - "TZ=Europe/Bucharest"
      - "SAMBA_USER_0_NAME=${SAMBA_USER}"
      - "SAMBA_USER_0_PASSWORD=${SAMBA_PASS}"
      - "SAMBA_0_NAME=Downloads"
      - "SAMBA_0_PATH=/mnt/Media"
      - "SAMBA_0_BROWSEABLE=yes"
      - "SAMBA_0_READ_ONLY=no"
      - "SAMBA_0_VALID_USERS=${SAMBA_USER}"
    volumes:
      - /opt/hometools/data/metube:/mnt/Media
    healthcheck:
      test: ["CMD", "smbclient", "-L", "localhost", "-U", "${SAMBA_USER}%${SAMBA_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 3
