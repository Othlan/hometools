services:
  metube:
    image: alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "8080:8081"
    volumes:
      - /hometools/metube:/downloads
    environment:
      DELETE_FILE_ON_TRASHCAN: "true"
      YTP_METADATA: "false"
      YTDL_OPTIONS: '{"writethumbnail": false, "writeinfojson": false, "addmetadata": false}'
      YTP_POSTPROCESSOR_ARGS: "ffmpeg:-map_metadata -1 -fflags +bitexact -flags:v +bitexact -flags:a +bitexact"

  stirling-pdf:
    image: ghcr.io/stirling-tools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"

  samba:
    image: dperson/samba:latest
    container_name: samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
    environment:
      USER: "${SAMBA_USER}"
      PASS: "${SAMBA_PASS}"
    volumes:
      - /hometools/metube:/mnt/Media
    command:
      -u "$$USER;$$PASS"
      -s "Downloads;/mnt/Media;yes;no;no;$$USER"
      -p